apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/GoRoutex/go-routex-deployment-config.git
    targetRevision: master
    path: deployment-config
    helm:
      releaseName: postgresql-dev
      valueFiles:
        - service/go-routex-driver-service/values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: orion-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true